title: Suspicious Credential Access Related Activity
id: 22222222-2222-2222-2222-222222222222
status: experimental
description: Detects suspicious process execution or command-line behavior associated with credential access simulation
logsource:
  product: windows
  category: process_creation
detection:
  selection_tools:
    Image|endswith:
      - '\rundll32.exe'
      - '\procdump.exe'
      - '\powershell.exe'
      - '\cmd.exe'
  selection_keywords:
    CommandLine|contains:
      - 'lsass'
      - 'sekurlsa'
      - 'comsvcs'
      - 'MiniDump'
  condition: selection_tools and selection_keywords
level: high
tags:
  - attack.credential_access
  - attack.t1003